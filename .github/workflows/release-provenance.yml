# Release workflow with npm provenance.
# Author: Admilson B. F. Cossa
# SPDX-License-Identifier: Apache-2.0

name: Release Provenance

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish as a dry run.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.13"

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: "2.2.7"

      - name: Install dependencies
        run: npm ci

      - name: Configure signed tag verification
        run: git config --global gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/.github/allowed_signers"

      - name: Verify package
        run: npm run verify

      - name: Verify coverage
        run: npm run test:coverage

      - name: Publish dry run
        if: inputs.dry_run == 'true'
        run: npm publish --provenance --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: inputs.dry_run == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
